name: PR Check

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Enable auto-merge after approval
        if: success() && !github.event.pull_request.draft
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const latestStateByUser = new Map();
            for (const review of reviews) {
              if (review.user?.login) {
                latestStateByUser.set(review.user.login, review.state);
              }
            }

            const hasApproval = [...latestStateByUser.values()].includes("APPROVED");
            if (!hasApproval) {
              core.info("No approval found yet. Skipping auto-merge enable.");
              return;
            }

            try {
              await github.graphql(
                `
                  mutation EnableAutoMerge($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: {
                        pullRequestId: $pullRequestId
                        mergeMethod: SQUASH
                      }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId: pr.node_id }
              );

              core.info(`Auto-merge enabled for PR #${pr.number}.`);
            } catch (error) {
              core.warning(`Failed to enable auto-merge: ${error.message}`);
            }

      - name: Comment on build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "文档站点自动构建失败了，当前 PR 还不能通过构建检查。",
              "",
              `请查看 Actions 日志并修复后重新提交：${runUrl}`
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

